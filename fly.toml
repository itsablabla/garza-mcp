app = "mcpx-garza"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_HOST = "0.0.0.0"
  SERVER_PORT = "3104"

[http_service]
  internal_port = 3104
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
