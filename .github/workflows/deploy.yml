name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - "garza_mcp/**"
      - "pyproject.toml"
      - "uv.lock"
      - "README.md"
      - "Dockerfile"
      - "fly.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify tool registration
        run: |
          uv run python - <<'PY'
          from garza_mcp.server import mcp
          tools = mcp._tool_manager._tools
          assert len(tools) == 178, f"Expected 178 tools, got {len(tools)}"
          print(f"All {len(tools)} tools registered successfully")
          PY

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --ha=false --app mcpx-garza

      - name: Health check
        run: |
          sleep 10
          for url in "https://mcpx.garza.online" "https://mcpx-garza.fly.dev"; do
            for i in 1 2 3 4 5; do
              if curl -fsS "$url/health"; then
                echo "Health check passed at $url"
                exit 0
              fi
              sleep 5
            done
          done
          echo "Health check failed for all known URLs"
          exit 1
