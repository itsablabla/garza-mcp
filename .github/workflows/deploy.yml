name: Deploy to Mac Mini

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Verify tool registration
        run: |
          uv run python -c "
          from garza_mcp.server import mcp
          tools = mcp._tool_manager._tools
          assert len(tools) == 178, f'Expected 178 tools, got {len(tools)}'
          print(f'All {len(tools)} tools registered successfully')
          "

      - name: Package Python code
        run: tar czf /tmp/garza-mcp-python.tar.gz garza_mcp/ pyproject.toml uv.lock

      - name: Deploy to Mac Mini
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MAC_MINI_HOST }}
          username: ${{ secrets.MAC_MINI_USER }}
          password: ${{ secrets.MAC_MINI_PASSWORD }}
          source: "garza_mcp/,pyproject.toml,uv.lock"
          target: "/Users/customer/garza-mcp-python/"
          overwrite: true

      - name: Restart MCP Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MAC_MINI_HOST }}
          username: ${{ secrets.MAC_MINI_USER }}
          password: ${{ secrets.MAC_MINI_PASSWORD }}
          script: |
            export PATH="$HOME/.local/bin:$PATH"
            cd /Users/customer/garza-mcp-python
            uv sync
            # Restart via LaunchAgent
            launchctl unload ~/Library/LaunchAgents/com.garza.mcp-python.plist 2>/dev/null || true
            sleep 2
            launchctl load ~/Library/LaunchAgents/com.garza.mcp-python.plist
            sleep 5
            # Verify server is running
            curl -s http://localhost:3104/health
